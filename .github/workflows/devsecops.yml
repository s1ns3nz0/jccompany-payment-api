name: DevSecOps Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

# SP 800-204D §3.2: Minimal permissions
permissions:
  contents: read
  security-events: write
  id-token: write
  attestations: write

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:

  # ══════════════════════════════════════════════════════════════
  # DEVELOP Phase
  # DoD Guidebook Table 1: Code commit scan - REQUIRED
  # DoD Guidebook Table 5: Static code scan before commit - REQUIRED
  # SP 800-204D §5.1.4: Secure Code Commits
  # SSDF PS.1 / NIST 800-53: IA-5, SI-3, SR-3, SA-11
  # ══════════════════════════════════════════════════════════════

  secret-scan:
    name: "[DEVELOP] Gitleaks - Secret Detection"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (SHA-pinned / SP 800-204D §5.1.1)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Gitleaks (IA-5, SI-3, SR-3 / SSDF PS.1 / SP 800-204D §5.1.4)
        uses: gitleaks/gitleaks-action@v2  # v2.3.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-semgrep:
    name: "[DEVELOP] Semgrep - SAST"
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - name: Checkout (SHA-pinned / SP 800-204D §5.1.1)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Semgrep (SA-11, SI-10, SC-13 / SSDF PW.7, PW.8 / SP 800-204D §5.1.3)
        uses: semgrep/semgrep-action@v1  # v1.2.0
        with:
          config: >
            p/java
            p/spring
            p/owasp-top-ten
            p/secrets
            p/sql-injection
            p/xss
            p/command-injection
            p/java-jwt
            p/crypto
            p/log-injection
            p/deserialization
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true
