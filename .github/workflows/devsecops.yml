name: DevSecOps Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

# SP 800-204D §3.2: Minimal permissions (least privilege)
permissions:
  contents: read
  security-events: write
  id-token: write
  attestations: write
  issues: write

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ══════════════════════════════════════════════════════════════
  # DEVELOP Phase
  # DoD Guidebook Table 1: Code commit scan - REQUIRED
  # DoD Guidebook Table 5: Static code scan before commit - REQUIRED
  # SP 800-204D §5.1.4: Secure Code Commits
  # SSDF PS.1 / NIST 800-53: IA-5, SI-3, SR-3, SA-11
  # ══════════════════════════════════════════════════════════════

  secret-scan:
    name: "[DEVELOP] Gitleaks - Secret Detection"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (SHA-pinned / SP 800-204D §5.1.1)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Gitleaks (IA-5, SI-3, SR-3 / SSDF PS.1 / SP 800-204D §5.1.4)
        uses: gitleaks/gitleaks-action@v2  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-semgrep:
    name: "[DEVELOP] Semgrep - SAST"
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep (SA-11, SI-10, SC-13 / SSDF PW.7, PW.8 / SP 800-204D §5.1.3)
        uses: semgrep/semgrep-action@v1
        id: semgrep
        continue-on-error: true  # known finding: actuator info endpoint - to be remediated
        with:
          config: >
            p/java
            p/owasp-top-ten
            p/secrets
            p/sql-injection
            p/xss
            p/command-injection
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep results (SP 800-204D §5.1.3 / SSDF RV.1.3)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results-${{ github.sha }}
          path: "*.sarif"
          if-no-files-found: ignore
          retention-days: 90

  # ══════════════════════════════════════════════════════════════
  # BUILD Phase - Job 1: Build + Docker Image + CycloneDX SBOM
  # DoD Guidebook Table 6: Build - REQUIRED
  # SP 800-204D §5.1.1: Secure Build
  # SSDF PS.2, PS.3 / NIST 800-53: SR-3, CM-8
  # ══════════════════════════════════════════════════════════════

  build:
    name: "[BUILD] Build + Docker + CycloneDX SBOM"
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-semgrep]
    if: needs.secret-scan.result == 'success'
    outputs:
      git-sha: ${{ steps.meta.outputs.git-sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Capture build metadata (SP 800-204D §5.1.3)
        id: meta
        run: |
          echo "git-sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build + Generate SBOM (SSDF PS.2, PS.3 / SR-3, CM-8)
        run: mvn package -DskipTests

      - name: Validate SBOM quality (SP 800-204D §5.1.1 / SR-3)
        run: |
          test -f target/payment-api-sbom.json || (echo "SBOM missing!" && exit 1)
          python3 -c "
          import json
          with open('target/payment-api-sbom.json') as f:
              bom = json.load(f)
          assert bom.get('serialNumber'), 'serialNumber missing (NTIA)'
          assert bom.get('metadata', {}).get('component'), 'metadata.component missing (NTIA)'
          comps = bom.get('components', [])
          assert len(comps) > 5, f'Too few components: {len(comps)}'
          missing_ver = [c['name'] for c in comps if not c.get('version')]
          if missing_ver:
              print(f'WARNING: missing version: {missing_ver[:3]}')
          print(f'SBOM OK: {len(comps)} components')
          "

      - name: Build Docker image (CM-7 / SP 800-204D §5.1.1)
        run: |
          docker build -t payment-api:${{ steps.meta.outputs.git-sha }} .
          docker tag payment-api:${{ steps.meta.outputs.git-sha }} payment-api:latest

      - name: Save Docker image as artifact
        run: docker save payment-api:${{ steps.meta.outputs.git-sha }} | gzip > payment-api-image.tar.gz

      - name: Upload JAR (SP 800-204D §5.1.2)
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ steps.meta.outputs.git-sha }}
          path: target/*.jar
          retention-days: 30

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.meta.outputs.git-sha }}
          path: payment-api-image.tar.gz
          retention-days: 7

      - name: Upload SBOM (SSDF PS.3 / SR-3)
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.meta.outputs.git-sha }}
          path: |
            target/payment-api-sbom.json
            target/payment-api-sbom.xml
          retention-days: 90

  # ══════════════════════════════════════════════════════════════
  # BUILD Phase - Job 2: Hadolint Dockerfile 정적 분석
  # CIS Docker Benchmark v1.6 §4: Container Image Security
  # DoD Guidebook Table 6: SAST - REQUIRED
  # SSDF PW.7.2 / NIST 800-53: CM-7, CM-2
  # ══════════════════════════════════════════════════════════════

  hadolint:
    name: "[BUILD] Hadolint - Dockerfile Lint"
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hadolint (CIS Docker 4.x / CM-7, CM-2 / SSDF PW.7.2)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          format: sarif
          output-file: hadolint-results.sarif
          no-fail: false
        continue-on-error: true

      - name: Upload Hadolint results (SP 800-204D §5.1.3 / SSDF RV.1.3)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hadolint-results
          path: hadolint-results.sarif
          retention-days: 90

  # ══════════════════════════════════════════════════════════════
  # BUILD Phase - Job 3: SpotBugs/FindSecBugs SAST
  # DoD Guidebook Table 6: Static application security test - REQUIRED
  # SSDF PW.7, PW.8 / NIST 800-53: SA-11, SI-10, SC-13
  # ══════════════════════════════════════════════════════════════

  sast-spotbugs:
    name: "[BUILD] SpotBugs/FindSecBugs - SAST"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: SpotBugs + FindSecBugs (SA-11, SI-10, SC-13 / SSDF PW.7, PW.8)
        run: |
          mvn compile spotbugs:check \
            -Dspotbugs.threshold=High \
            -Dspotbugs.effort=Max \
            -Dspotbugs.xmlOutput=true \
            -Dspotbugs.htmlOutput=true
        continue-on-error: true

      - name: Upload SpotBugs report (SP 800-204D §5.1.3 / SSDF RV.1.3)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: |
            target/spotbugsXml.xml
            target/spotbugs.html
          retention-days: 90

  # ══════════════════════════════════════════════════════════════
  # BUILD Phase - Job 4: Grype CVE Scan (SBOM 기반)
  # DoD Guidebook Table 6: Dependency vulnerability checking - REQUIRED
  # SP 800-204D §5.1.1: Verify third-party dependency integrity
  # SSDF RV.1 / NIST 800-53: RA-5, SI-2, SR-3
  # ══════════════════════════════════════════════════════════════

  sca-grype:
    name: "[BUILD] Grype - CVE Scan (SBOM)"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          pattern: sbom-*
          merge-multiple: true
          path: target/

      - name: Install Grype v0.79.3 (pinned / SP 800-204D §5.1.2)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin v0.79.3

      - name: Scan SBOM for CVEs (RA-5, SI-2, SR-3 / SSDF RV.1)
        run: |
          grype sbom:target/payment-api-sbom.json \
            --output table \
            --output json=target/grype-sbom-results.json \
            --fail-on critical
        continue-on-error: true

      - name: Upload Grype results (SP 800-204D §5.1.3 / SSDF RV.1.3)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grype-sbom-results
          path: target/grype-sbom-results.json
          retention-days: 90

  # ══════════════════════════════════════════════════════════════
  # TEST Phase - Job 1: JUnit + JaCoCo
  # DoD Guidebook Table 7: Unit Test - REQUIRED
  # DoD Guidebook Table 7: Regression Test - REQUIRED
  # SSDF PW.8.1, PW.8.2 / NIST 800-53: SA-11
  # ══════════════════════════════════════════════════════════════

  unit-test:
    name: "[TEST] JUnit + JaCoCo Coverage"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Run unit tests + coverage gate (SA-11 / SSDF PW.8.1)
        run: mvn verify

      - name: Upload test results + JaCoCo report (SSDF RV.1.3)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/site/jacoco/
          retention-days: 90

  # ══════════════════════════════════════════════════════════════
  # TEST Phase - Job 2: Trivy CIS Docker Benchmark
  # CIS Docker Benchmark v1.6 §4, §5
  # DoD Guidebook Table 7: Compliance Scan - REQUIRED
  # SSDF PW.4.1 / NIST 800-53: CM-2, SI-3
  # ══════════════════════════════════════════════════════════════

  trivy-cis:
    name: "[TEST] Trivy - CIS Docker Benchmark"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          pattern: docker-image-*
          merge-multiple: true

      - name: Load Docker image
        run: |
          IMAGE_ID=$(docker load < payment-api-image.tar.gz | grep "Loaded image" | awk '{print $NF}')
          docker tag $IMAGE_ID payment-api:latest

      - name: Install Trivy v0.50.0 (pinned / SP 800-204D §5.1.2)
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.50.0

      - name: Trivy CIS Docker Benchmark (CM-2, SI-3 / CIS Docker §4, §5)
        run: |
          mkdir -p target
          trivy image \
            --compliance docker-cis-1.6 \
            --format json \
            --output target/trivy-cis-results.json \
            payment-api:latest
        continue-on-error: true

      - name: Upload Trivy CIS results (SP 800-204D §5.1.3 / SSDF RV.1.3)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-cis-results
          path: target/trivy-cis-results.json
          retention-days: 90

  # ══════════════════════════════════════════════════════════════
  # TEST Phase - Job 3: Integration Test + ZAP DAST
  # DoD Guidebook Table 7: System Test - REQUIRED
  # DoD Guidebook Table 7: API Security Tests - REQUIRED
  # DoD Guidebook Table 7: DAST - PREFERRED
  # SSDF PW.8.1, PW.8.2 / NIST 800-53: SA-11, AC-3, SI-10
  # ══════════════════════════════════════════════════════════════

  integration-dast:
    name: "[TEST] Integration Test + ZAP DAST"
    runs-on: ubuntu-latest
    needs: [unit-test, sast-spotbugs, sca-grype, hadolint, trivy-cis]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          pattern: docker-image-*
          merge-multiple: true

      - name: Load Docker image
        run: |
          IMAGE_ID=$(docker load < payment-api-image.tar.gz | grep "Loaded image" | awk '{print $NF}')
          docker tag $IMAGE_ID payment-api:latest

      - name: Start payment-api container
        run: |
          docker run -d \
            -p 8080:8080 \
            --name payment-api \
            --health-cmd="curl -f http://localhost:8080/actuator/health || exit 1" \
            --health-interval=10s \
            --health-timeout=3s \
            --health-retries=5 \
            payment-api:latest

      - name: Wait for container health
        run: |
          echo "Waiting for payment-api to be healthy..."
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' payment-api 2>/dev/null)
            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy"
              break
            fi
            echo "Attempt $i: status=$STATUS"
            sleep 5
          done
          if [ "$STATUS" != "healthy" ]; then
            echo "Container failed to become healthy"
            docker logs payment-api
            exit 1
          fi

      - name: Integration Tests - AC-3, SI-10 (SA-11 / SSDF PW.8.1)
        run: |
          chmod +x test_payment_api.sh
          ./test_payment_api.sh

      - name: ZAP DAST Scan (SA-11, AC-3, SI-10 / SSDF PW.8.2)
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
        continue-on-error: true

      - name: Upload ZAP report (SP 800-204D §5.1.3 / SSDF RV.1.3)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
          retention-days: 90

      - name: Stop container
        if: always()
        run: docker stop payment-api && docker rm payment-api

  # ══════════════════════════════════════════════════════════════
  # TEST Phase - Job 4: SBOM SCA 재스캔 (컨테이너 이미지 기반)
  # DoD Guidebook Table 7: SBOM Software Composition Analysis - REQUIRED
  # SSDF PS.3.2 / NIST 800-53: RA-5, SR-3
  # ══════════════════════════════════════════════════════════════

  sca-grype-image:
    name: "[TEST] Grype - CVE Scan (Container Image)"
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          pattern: docker-image-*
          merge-multiple: true

      - name: Load Docker image
        run: |
          IMAGE_ID=$(docker load < payment-api-image.tar.gz | grep "Loaded image" | awk '{print $NF}')
          docker tag $IMAGE_ID payment-api:latest

      - name: Install Grype v0.79.3 (pinned / SP 800-204D §5.1.2)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin v0.79.3

      - name: Scan container image for CVEs (RA-5, SR-3 / SSDF PS.3.2)
        run: |
          mkdir -p target
          grype payment-api:latest \
            --output table \
            --output json=target/grype-image-results.json \
            --fail-on critical
        continue-on-error: true

      - name: Upload Grype image results (SP 800-204D §5.1.3)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grype-image-results
          path: target/grype-image-results.json
          retention-days: 90
