name: DevSecOps Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

# SP 800-204D S3.2: Minimal permissions (least privilege)
permissions:
  contents: read
  security-events: write
  id-token: write
  attestations: write

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ==============================================================
  # DEVELOP Phase
  # ==============================================================

  secret-scan:
    name: "[DEVELOP] Gitleaks - Secret Detection"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (SHA-pinned / SP 800-204D S5.1.1)
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0
        with:
          fetch-depth: 0

      - name: Gitleaks (IA-5, SI-3, SR-3 / SSDF PS.1 / SP 800-204D S5.1.4)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks
          gitleaks git --source=. --no-banner --report-format sarif --report-path results.sarif || true
          # gitleaks creates no file when 0 findings -- create empty SARIF
          if [ ! -f results.sarif ]; then
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"gitleaks"}},"results":[]}]}' > results.sarif
          fi
          FINDINGS=$(jq '.runs[0].results | length' results.sarif 2>/dev/null || echo 0)
          echo "Gitleaks: ${FINDINGS} findings"
          if [ "$FINDINGS" -gt 0 ]; then
            echo "::warning::Gitleaks detected ${FINDINGS} secret(s)"
          fi

      - name: Upload Gitleaks results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: always()
        with:
          name: gitleaks-results
          path: results.sarif
          retention-days: 90

  sast-semgrep:
    name: "[DEVELOP] Semgrep - SAST"
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Semgrep (SA-11, SI-10, SC-13 / SSDF PW.7, PW.8 / SP 800-204D S5.1.3)
        continue-on-error: true
        run: |
          pip install semgrep --break-system-packages -q
          semgrep --config p/java --config p/owasp-top-ten --config p/secrets \
            --config p/sql-injection --config p/xss --config p/command-injection \
            --sarif --output semgrep-results.sarif . || true
          echo "Semgrep findings: $(jq '.runs[0].results | length' semgrep-results.sarif 2>/dev/null || echo 0)"

      - name: Upload Semgrep results (SP 800-204D S5.1.3 / SSDF RV.1.3)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: always()
        with:
          name: semgrep-results-${{ github.sha }}
          path: semgrep-results.sarif
          if-no-files-found: warn
          retention-days: 90

  # ==============================================================
  # BUILD Phase
  # ==============================================================

  build:
    name: "[BUILD] Build + Docker + CycloneDX SBOM"
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-semgrep]
    if: |
      needs.secret-scan.result == 'success' &&
      needs.sast-semgrep.result != 'failure'
    outputs:
      git-sha: ${{ steps.meta.outputs.git-sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Set up Java 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Capture build metadata (SP 800-204D S5.1.3)
        id: meta
        run: |
          echo "git-sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build + Generate SBOM (SSDF PS.2, PS.3 / SR-3, CM-8)
        run: mvn package -DskipTests

      - name: Validate SBOM quality (SP 800-204D S5.1.1 / SR-3)
        run: |
          test -f target/payment-api-sbom.json || (echo "SBOM missing!" && exit 1)
          python3 -c "
          import json
          with open('target/payment-api-sbom.json') as f:
              bom = json.load(f)
          assert bom.get('serialNumber'), 'serialNumber missing (NTIA)'
          assert bom.get('metadata', {}).get('component'), 'metadata.component missing (NTIA)'
          comps = bom.get('components', [])
          assert len(comps) > 5, f'Too few components: {len(comps)}'
          print(f'SBOM OK: {len(comps)} components')
          "

      - name: Build Docker image (CM-7 / SP 800-204D S5.1.1)
        run: |
          docker build -t payment-api:${{ steps.meta.outputs.git-sha }} .
          docker tag payment-api:${{ steps.meta.outputs.git-sha }} payment-api:latest

      - name: Save Docker image as artifact
        run: docker save payment-api:${{ steps.meta.outputs.git-sha }} | gzip > payment-api-image.tar.gz

      - name: Upload JAR
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: jar-${{ steps.meta.outputs.git-sha }}
          path: target/*.jar
          retention-days: 90

      - name: Upload Docker image
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: docker-image-${{ steps.meta.outputs.git-sha }}
          path: payment-api-image.tar.gz
          retention-days: 90

      - name: Upload SBOM (SSDF PS.3 / SR-3)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: sbom-${{ steps.meta.outputs.git-sha }}
          path: |
            target/payment-api-sbom.json
            target/payment-api-sbom.xml
          retention-days: 90

      - name: Upload SBOM to Dependency-Track (RA-5, SR-3 / SSDF RV.1.1)
        if: success()
        env:
          DT_URL: ${{ secrets.DT_URL }}
          DT_API_KEY: ${{ secrets.DT_API_KEY }}
        run: |
          if [ -z "$DT_URL" ] || [ -z "$DT_API_KEY" ]; then
            echo "::warning::D-Track secrets not set -- skipping SBOM upload"
            exit 0
          fi
          for attempt in 1 2 3; do
            HTTP=$(curl -sf -X POST "${DT_URL}/api/v1/bom" \
              -H "X-Api-Key: ${DT_API_KEY}" \
              -H "Content-Type: multipart/form-data" \
              -F "autoCreate=true" \
              -F "projectName=payment-api" \
              -F "projectVersion=latest" \
              -F "bom=@target/payment-api-sbom.json;type=application/json" \
              -o /dev/null -w "%{http_code}" 2>/dev/null) || HTTP="000"
            echo "D-Track upload attempt ${attempt}: HTTP ${HTTP}"
            [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ] && break
            sleep 5
          done
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "201" ]; then
            echo "::warning::Dependency-Track upload failed after 3 retries (HTTP ${HTTP}) -- CVE monitoring gap"
          fi

  hadolint:
    name: "[BUILD] Hadolint - Dockerfile Lint"
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Hadolint (CIS Docker 4.x / CM-7, CM-2 / SSDF PW.7.2)
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          format: sarif
          output-file: hadolint-results.sarif
          no-fail: false
        continue-on-error: true

      - name: Upload Hadolint results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: always()
        with:
          name: hadolint-results
          path: hadolint-results.sarif
          retention-days: 90

  checkov:
    name: "[BUILD] Checkov - IaC Security Scan"
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Checkov K8s Manifest Scan (CM-2, CM-6, AC-4, AC-6, SC-5)
        run: |
          pip install checkov --break-system-packages -q
          checkov -d k8s/ --framework kubernetes --soft-fail \
            --output json --output-file-path checkov-k8s-results.json 2>/dev/null || true
          # checkov creates directory; move file to expected location
          if [ -f checkov-k8s-results.json/results_json.json ]; then
            mv checkov-k8s-results.json/results_json.json checkov-k8s-results-final.json
            rm -rf checkov-k8s-results.json
            mv checkov-k8s-results-final.json checkov-k8s-results.json
          fi
          PASSED=$(jq '.summary.passed // 0' checkov-k8s-results.json 2>/dev/null || echo 0)
          FAILED=$(jq '.summary.failed // 0' checkov-k8s-results.json 2>/dev/null || echo 0)
          echo "Checkov K8s: passed=${PASSED} failed=${FAILED}"
        continue-on-error: true

      - name: Checkov Dockerfile Scan (CM-7, SC-28, AC-6)
        run: |
          checkov -f Dockerfile --framework dockerfile --soft-fail \
            --output json --output-file-path checkov-dockerfile-results.json 2>/dev/null || true
          if [ -f checkov-dockerfile-results.json/results_json.json ]; then
            mv checkov-dockerfile-results.json/results_json.json checkov-dockerfile-results-final.json
            rm -rf checkov-dockerfile-results.json
            mv checkov-dockerfile-results-final.json checkov-dockerfile-results.json
          fi
          PASSED=$(jq '.summary.passed // 0' checkov-dockerfile-results.json 2>/dev/null || echo 0)
          FAILED=$(jq '.summary.failed // 0' checkov-dockerfile-results.json 2>/dev/null || echo 0)
          echo "Checkov Dockerfile: passed=${PASSED} failed=${FAILED}"
        continue-on-error: true

      - name: Checkov Summary
        run: |
          echo "## Checkov IaC Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "- K8s manifests: k8s/" >> $GITHUB_STEP_SUMMARY
          echo "- Dockerfile: Dockerfile" >> $GITHUB_STEP_SUMMARY
          echo "- Framework: kubernetes, dockerfile" >> $GITHUB_STEP_SUMMARY
          echo "- Controls: CM-2, CM-6, AC-4, AC-6, SC-5, SC-28" >> $GITHUB_STEP_SUMMARY

      - name: Upload Checkov results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: always()
        with:
          name: checkov-results
          path: |
            checkov-k8s-results.json
            checkov-dockerfile-results.json
          if-no-files-found: warn
          retention-days: 90

  cis-java:
    name: "[BUILD] CIS Java Benchmark"
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: CIS Java Benchmark Check (CM-7, SC-8, SC-13, AU-2, SR-3)
        run: |
          chmod +x scripts/cis-java-check.sh
          ./scripts/cis-java-check.sh | tee cis-java-results.txt
        continue-on-error: true

      - name: Upload CIS Java results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: always()
        with:
          name: cis-java-results
          path: cis-java-results.txt
          retention-days: 90

  sast-spotbugs:
    name: "[BUILD] SpotBugs/FindSecBugs - SAST"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Set up Java 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: SpotBugs + FindSecBugs (SA-11, SI-10, SC-13 / SSDF PW.7, PW.8)
        run: |
          mvn compile spotbugs:check \
            -Dspotbugs.threshold=High \
            -Dspotbugs.effort=Max \
            -Dspotbugs.xmlOutput=true \
            -Dspotbugs.htmlOutput=true
        continue-on-error: true

      - name: Upload SpotBugs report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: always()
        with:
          name: spotbugs-report
          path: |
            target/spotbugsXml.xml
            target/spotbugs.html
          retention-days: 90

  sca-grype:
    name: "[BUILD] Grype - CVE Scan (SBOM)"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Download SBOM
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: sbom-*
          merge-multiple: true
          path: target/

      - name: Scan SBOM for CVEs (RA-5, SI-2, SR-3 / SSDF RV.1)
        id: grype-sbom
        run: |
          curl -sSfL -o /tmp/grype.tar.gz \
            https://github.com/anchore/grype/releases/download/v0.112.0/grype_0.112.0_linux_amd64.tar.gz
          echo "acb14a030010fe9bdb9594b4ae108d9d14ef2f926d936aa0916dc62c89c058ea  /tmp/grype.tar.gz" | sha256sum -c
          tar xzf /tmp/grype.tar.gz -C /usr/local/bin grype
          grype sbom:target/payment-api-sbom.json -o json > results.json 2>/dev/null || echo '{"matches":[]}' > results.json
          MATCHES=$(jq '.matches | length' results.json 2>/dev/null || echo 0)
          echo "Grype SBOM: ${MATCHES} CVE matches found"
          echo "grype-matches=${MATCHES}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload Grype SBOM results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: always()
        with:
          name: grype-sbom-results
          path: results.json
          retention-days: 90

  # ==============================================================
  # TEST Phase
  # ==============================================================

  unit-test:
    name: "[TEST] JUnit + JaCoCo Coverage"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Set up Java 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Run unit tests + coverage gate (SA-11 / SSDF PW.8.1)
        run: mvn verify

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: always()
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/site/jacoco/
          if-no-files-found: warn
          retention-days: 90

  trivy-cis:
    name: "[TEST] Trivy - CIS Docker Benchmark"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Download Docker image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: docker-image-*
          merge-multiple: true

      - name: Load Docker image
        run: |
          IMAGE_ID=$(docker load < payment-api-image.tar.gz | grep "Loaded image" | awk '{print $NF}')
          docker tag $IMAGE_ID payment-api:latest

      - name: Install Trivy v0.70.0 (SHA-hardcoded / SP 800-204D S5.1.2)
        run: |
          curl -sSfL -o /tmp/trivy.tar.gz \
            https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.tar.gz
          # SHA256 hardcoded -- update when bumping Trivy version
          # Verify: curl -sSfL https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.tar.gz | sha256sum
          echo "8b4376d5d6befe5c24d503f10ff136d9e0c49f9127a4279fd110b727929a5aa9  /tmp/trivy.tar.gz" | sha256sum -c
          tar xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy

      - name: Trivy CIS Docker Benchmark (CM-2, SI-3 / CIS Docker S4, S5)
        run: |
          mkdir -p target
          # CIS compliance check (text output for evidence)
          trivy image --compliance docker-cis-1.6 payment-api:latest \
            > target/trivy-cis-compliance.txt 2>&1 || true
          echo "CIS compliance check: $(wc -l < target/trivy-cis-compliance.txt) lines"
          # Vulnerability scan (JSON output for Risk Platform)
          trivy image --format json --output target/trivy-cis-results.json \
            payment-api:latest 2>/dev/null || echo '{"Results":[]}' > target/trivy-cis-results.json
          VULNS=$(jq '[.Results[]?.Vulnerabilities // [] | length] | add // 0' target/trivy-cis-results.json 2>/dev/null || echo 0)
          echo "Trivy: ${VULNS} vulnerabilities found"

      - name: Upload Trivy CIS results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: always()
        with:
          name: trivy-cis-results
          path: target/trivy-cis-results.json
          retention-days: 90

  integration-dast:
    name: "[TEST] Integration Test + ZAP DAST"
    runs-on: ubuntu-latest
    needs: [unit-test, sast-spotbugs, sca-grype, hadolint, trivy-cis, cis-java]
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Download Docker image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: docker-image-*
          merge-multiple: true

      - name: Load Docker image
        run: |
          IMAGE_ID=$(docker load < payment-api-image.tar.gz | grep "Loaded image" | awk '{print $NF}')
          docker tag $IMAGE_ID payment-api:latest

      - name: Start payment-api container
        run: |
          docker run -d \
            -p 8080:8080 \
            --name payment-api \
            payment-api:latest

      - name: Wait for container health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Container is healthy (attempt $i)"
              break
            fi
            echo "Attempt $i: waiting..."
            sleep 5
          done
          if ! curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
            echo "Container failed to become healthy"
            docker logs payment-api
            exit 1
          fi

      - name: Integration Tests (SA-11, AC-3, SI-10 / SSDF PW.8.1)
        run: |
          chmod +x test_payment_api.sh
          ./test_payment_api.sh

      - name: ZAP DAST Scan (SA-11, AC-3, SI-10 / SSDF PW.8.2)
        uses: zaproxy/action-full-scan@3c58388149901b9a03b7718852c5ba889646c27c  # v0.13.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          allow_issue_writing: false
        continue-on-error: true

      - name: Upload ZAP report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: always()
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
          retention-days: 90

      - name: Stop container
        if: always()
        run: docker stop payment-api && docker rm payment-api

  sca-grype-image:
    name: "[TEST] Grype - CVE Scan (Container Image)"
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Download Docker image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: docker-image-*
          merge-multiple: true

      - name: Load Docker image
        run: |
          IMAGE_ID=$(docker load < payment-api-image.tar.gz | grep "Loaded image" | awk '{print $NF}')
          docker tag $IMAGE_ID payment-api:latest

      - name: Scan container image for CVEs (RA-5, SR-3 / SSDF PS.3.2)
        id: grype-image
        run: |
          curl -sSfL -o /tmp/grype.tar.gz \
            https://github.com/anchore/grype/releases/download/v0.112.0/grype_0.112.0_linux_amd64.tar.gz
          echo "acb14a030010fe9bdb9594b4ae108d9d14ef2f926d936aa0916dc62c89c058ea  /tmp/grype.tar.gz" | sha256sum -c
          tar xzf /tmp/grype.tar.gz -C /usr/local/bin grype
          grype payment-api:latest -o json > results.json 2>/dev/null || echo '{"matches":[]}' > results.json
          MATCHES=$(jq '.matches | length' results.json 2>/dev/null || echo 0)
          echo "Grype Image: ${MATCHES} CVE matches found"
          echo "grype-matches=${MATCHES}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload Grype Image results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: always()
        with:
          name: grype-image-results
          path: results.json
          retention-days: 90

  # ==============================================================
  # RISK ASSESSMENT Phase (replaces release-gate)
  # SP 800-30 Rev 1: Integrated risk assessment via Risk Platform
  # 6-phase coverage: DEVELOP -> BUILD -> TEST -> RELEASE(gate) -> DELIVER -> DEPLOY
  # ==============================================================

  risk-assess-develop:
    name: "[RISK] DEVELOP Phase Assessment (SP 800-30)"
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-semgrep]
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Download DEVELOP scanner artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          path: scanner-results/

      - name: Prepare scanner results for Risk Platform
        run: |
          mkdir -p risk-input
          safe_wrap_json() {
            local scanner="$1" format="$2" file="$3" output="$4"
            if [ -f "$file" ]; then
              jq -n --arg s "$scanner" --arg f "$format" --slurpfile c "$file" \
                '{scanner:$s, format:$f, content:$c[0]}' > "$output" 2>/dev/null && return
              jq -n --arg s "$scanner" --arg f "$format" --rawfile c "$file" \
                '{scanner:$s, format:$f, content:$c}' > "$output"
            fi
          }
          # DEVELOP scanners only
          # Semgrep (SARIF)
          SEMGREP_FILE=$(find scanner-results/ -name "*.sarif" -path "*semgrep*" 2>/dev/null | head -1)
          [ -n "$SEMGREP_FILE" ] && safe_wrap_json semgrep sarif "$SEMGREP_FILE" risk-input/semgrep.json
          # Gitleaks (SARIF)
          safe_wrap_json gitleaks sarif scanner-results/gitleaks-results/results.sarif risk-input/gitleaks.json
          # Remove files with null content
          for f in risk-input/*.json; do
            if jq -e '.content == null' "$f" > /dev/null 2>&1; then
              echo "Removing ${f} (null content)"
              rm "$f"
            fi
          done
          COUNT=$(ls risk-input/*.json 2>/dev/null | wc -l)
          if [ "$COUNT" -gt 0 ]; then
            jq -n '{results: [inputs]}' risk-input/*.json > risk-input/combined.json
          else
            echo '{"results":[]}' > risk-input/combined.json
          fi
          echo "DEVELOP scanners collected: ${COUNT} files"

      - name: Risk Assessment -- DEVELOP (RA-3, CA-2 / SP 800-30)
        if: always()
        env:
          RISK_API_KEY: ${{ secrets.RISK_PLATFORM_API_KEY }}
          RISK_URL: ${{ secrets.RISK_PLATFORM_URL }}
        run: |
          # Pre-create result file (ensures artifact upload even if step fails)
          echo '{}' > risk-develop-result.json
          if [ -z "$RISK_URL" ] || [ ! -f risk-input/combined.json ]; then
            echo "::warning::Risk Platform URL not set or no scanner input -- skipping"
            exit 0
          fi
          jq '. + {"async_mode": true, "phase": "DEVELOP"}' risk-input/combined.json > risk-input/payload.json
          HTTP_CODE=$(curl -s -o risk-develop-response.json -w "%{http_code}" \
            -X POST "${RISK_URL}/v1/products/payment-api/assess" \
            -H "X-API-Key: ${RISK_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @risk-input/payload.json)
          echo "Risk Platform response: HTTP ${HTTP_CODE}"
          if [ "$HTTP_CODE" = "202" ]; then
            JOB_ID=$(jq -r '.job_id' risk-develop-response.json)
            echo "Job submitted: ${JOB_ID} -- polling (max 3min)..."
            for i in $(seq 1 18); do
              sleep 10
              STATUS=$(curl -s -H "X-API-Key: ${RISK_API_KEY}" "${RISK_URL}/v1/jobs/${JOB_ID}" | jq -r '.status // empty')
              echo "  Poll ${i}/18: status=${STATUS}"
              [ "$STATUS" = "completed" ] || [ "$STATUS" = "failed" ] && break
            done
            curl -s -H "X-API-Key: ${RISK_API_KEY}" "${RISK_URL}/v1/jobs/${JOB_ID}" | jq '.result // .' > risk-develop-result.json
            python3 -c "
          import json
          with open('risk-develop-result.json') as f:
              r = json.load(f)
          print(f'DEVELOP Risk Level: {r.get(\"risk_level\", \"unknown\")}')
          print(f'Findings: {r.get(\"total_findings\", 0)}')
          " 2>/dev/null || echo "Response parsing skipped"
          elif [ "$HTTP_CODE" = "200" ]; then
            cp risk-develop-response.json risk-develop-result.json
            echo "Static mode response"
          else
            echo "::warning::Risk Platform returned HTTP ${HTTP_CODE} -- assessment skipped"
          fi

      - name: Upload DEVELOP risk assessment
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: always()
        with:
