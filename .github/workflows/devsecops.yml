name: DevSecOps Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

# SP 800-204D §3.2: Minimal permissions (least privilege)
# Phase 3: issues: write 제거 (M4 fix - 전역에서 불필요)
permissions:
  contents: read
  security-events: write
  id-token: write
  attestations: write

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ══════════════════════════════════════════════════════════════
  # DEVELOP Phase
  # DoD Guidebook Table 1: Code commit scan - REQUIRED
  # DoD Guidebook Table 5: Static code scan before commit - REQUIRED
  # SP 800-204D §5.1.4: Secure Code Commits
  # SSDF PS.1 / NIST 800-53: IA-5, SI-3, SR-3, SA-11
  # ══════════════════════════════════════════════════════════════

  secret-scan:
    name: "[DEVELOP] Gitleaks - Secret Detection"
    runs-on: ubuntu-latest
    # Phase 3 M4 fix: issues: write를 잡 레벨로 이동
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout (SHA-pinned / SP 800-204D §5.1.1)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Gitleaks (IA-5, SI-3, SR-3 / SSDF PS.1 / SP 800-204D §5.1.4)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9  # v2.3.9 — TODO: SHA-pin (H1 Phase4)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-semgrep:
    name: "[DEVELOP] Semgrep - SAST"
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Semgrep (SA-11, SI-10, SC-13 / SSDF PW.7, PW.8 / SP 800-204D §5.1.3)
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d  # v1
        id: semgrep
        continue-on-error: true
        with:
          config: >
            p/java
            p/owasp-top-ten
            p/secrets
            p/sql-injection
            p/xss
            p/command-injection
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep results (SP 800-204D §5.1.3 / SSDF RV.1.3)
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: semgrep-results-${{ github.sha }}
          path: "*.sarif"
          if-no-files-found: ignore
          retention-days: 90

  # ══════════════════════════════════════════════════════════════
  # BUILD Phase - Job 1: Build + Docker Image + CycloneDX SBOM
  # ══════════════════════════════════════════════════════════════

  build:
    name: "[BUILD] Build + Docker + CycloneDX SBOM"
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-semgrep]
    # Phase 3 M3 fix: semgrep 실패도 gate (sast-semgrep.result 추가)
    if: |
      needs.secret-scan.result == 'success' &&
      needs.sast-semgrep.result != 'failure'
    outputs:
      git-sha: ${{ steps.meta.outputs.git-sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Capture build metadata (SP 800-204D §5.1.3)
        id: meta
        run: |
          echo "git-sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build + Generate SBOM (SSDF PS.2, PS.3 / SR-3, CM-8)
        run: mvn package -DskipTests

      - name: Validate SBOM quality (SP 800-204D §5.1.1 / SR-3)
        run: |
          test -f target/payment-api-sbom.json || (echo "SBOM missing!" && exit 1)
          python3 -c "
          import json
          with open('target/payment-api-sbom.json') as f:
              bom = json.load(f)
          assert bom.get('serialNumber'), 'serialNumber missing (NTIA)'
          assert bom.get('metadata', {}).get('component'), 'metadata.component missing (NTIA)'
          comps = bom.get('components', [])
          assert len(comps) > 5, f'Too few components: {len(comps)}'
          print(f'SBOM OK: {len(comps)} components')
          "

      - name: Build Docker image (CM-7 / SP 800-204D §5.1.1)
        run: |
          docker build -t payment-api:${{ steps.meta.outputs.git-sha }} .
          docker tag payment-api:${{ steps.meta.outputs.git-sha }} payment-api:latest

      - name: Save Docker image as artifact
        run: docker save payment-api:${{ steps.meta.outputs.git-sha }} | gzip > payment-api-image.tar.gz

      - name: Upload JAR
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: jar-${{ steps.meta.outputs.git-sha }}
          path: target/*.jar
          retention-days: 30

      - name: Upload Docker image
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: docker-image-${{ steps.meta.outputs.git-sha }}
          path: payment-api-image.tar.gz
          retention-days: 30  # Phase 3 M7 fix: 7 → 30일

      - name: Upload SBOM (SSDF PS.3 / SR-3)
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: sbom-${{ steps.meta.outputs.git-sha }}
          path: |
            target/payment-api-sbom.json
            target/payment-api-sbom.xml
          retention-days: 90

  # ══════════════════════════════════════════════════════════════
  # BUILD Phase - Job 2: Hadolint
  # ══════════════════════════════════════════════════════════════

  hadolint:
    name: "[BUILD] Hadolint - Dockerfile Lint"
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Hadolint (CIS Docker 4.x / CM-7, CM-2 / SSDF PW.7.2)
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          format: sarif
          output-file: hadolint-results.sarif
          no-fail: false
        continue-on-error: true

      - name: Upload Hadolint results
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: hadolint-results
          path: hadolint-results.sarif
          retention-days: 90

  # ══════════════════════════════════════════════════════════════
  # BUILD Phase - Job 3b: Checkov IaC Security Scan
  # ══════════════════════════════════════════════════════════════

  checkov:
    name: "[BUILD] Checkov - IaC Security Scan"
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Checkov K8s Manifest Scan (CM-2, CM-6, AC-4, AC-6, SC-5)
        uses: bridgecrewio/checkov-action@33dbb953e9f9e28d92903b9c214f4072e6c7fd07  # v12.2969.0
        with:
          directory: k8s/
          framework: kubernetes
          soft_fail: true
          output_format: cli
          download_external_modules: false
        continue-on-error: true

      - name: Checkov Dockerfile Scan (CM-7, SC-28, AC-6)
        uses: bridgecrewio/checkov-action@33dbb953e9f9e28d92903b9c214f4072e6c7fd07  # v12.2969.0
        with:
          file: Dockerfile
          framework: dockerfile
          soft_fail: true
          output_format: cli
          download_external_modules: false
        continue-on-error: true

      - name: Checkov Summary
        run: |
          echo "## Checkov IaC Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "- K8s manifests: k8s/" >> $GITHUB_STEP_SUMMARY
          echo "- Dockerfile: Dockerfile" >> $GITHUB_STEP_SUMMARY
          echo "- Framework: kubernetes, dockerfile" >> $GITHUB_STEP_SUMMARY
          echo "- Controls: CM-2, CM-6, AC-4, AC-6, SC-5, SC-28" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════
  # BUILD Phase - Job 3: CIS Java Benchmark
  # ══════════════════════════════════════════════════════════════

  cis-java:
    name: "[BUILD] CIS Java Benchmark"
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: CIS Java Benchmark Check (CM-7, SC-8, SC-13, AU-2, SR-3)
        run: |
          chmod +x scripts/cis-java-check.sh
          ./scripts/cis-java-check.sh | tee cis-java-results.txt
        continue-on-error: true

      - name: Upload CIS Java results
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: cis-java-results
          path: cis-java-results.txt
          retention-days: 90

  # ══════════════════════════════════════════════════════════════
  # BUILD Phase - Job 4: SpotBugs
  # ══════════════════════════════════════════════════════════════

  sast-spotbugs:
    name: "[BUILD] SpotBugs/FindSecBugs - SAST"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: SpotBugs + FindSecBugs (SA-11, SI-10, SC-13 / SSDF PW.7, PW.8)
        run: |
          mvn compile spotbugs:check \
            -Dspotbugs.threshold=High \
            -Dspotbugs.effort=Max \
            -Dspotbugs.xmlOutput=true \
            -Dspotbugs.htmlOutput=true
        continue-on-error: true

      - name: Upload SpotBugs report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: spotbugs-report
          path: |
            target/spotbugsXml.xml
            target/spotbugs.html
          retention-days: 90

  # ══════════════════════════════════════════════════════════════
  # BUILD Phase - Job 5: Grype CVE Scan (SBOM)
  # ══════════════════════════════════════════════════════════════

  sca-grype:
    name: "[BUILD] Grype - CVE Scan (SBOM)"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download SBOM
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: sbom-*
          merge-multiple: true
          path: target/

      - name: Scan SBOM for CVEs (RA-5, SI-2, SR-3 / SSDF RV.1)
        uses: anchore/scan-action@64a33b277ea7a1215a3c142735a1091341939ff5  # v4.1.2
        with:
          sbom: target/payment-api-sbom.json
          fail-build: false
          severity-cutoff: critical
          output-format: json
        continue-on-error: true

  # ══════════════════════════════════════════════════════════════
  # TEST Phase - Job 1: JUnit + JaCoCo
  # ══════════════════════════════════════════════════════════════

  unit-test:
    name: "[TEST] JUnit + JaCoCo Coverage"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Run unit tests + coverage gate (SA-11 / SSDF PW.8.1)
        run: mvn verify

      - name: Upload test results
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/site/jacoco/
          retention-days: 90

  # ══════════════════════════════════════════════════════════════
  # TEST Phase - Job 2: Trivy CIS Docker Benchmark
  # ══════════════════════════════════════════════════════════════

  trivy-cis:
    name: "[TEST] Trivy - CIS Docker Benchmark"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download Docker image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: docker-image-*
          merge-multiple: true

      - name: Load Docker image
        run: |
          IMAGE_ID=$(docker load < payment-api-image.tar.gz | grep "Loaded image" | awk '{print $NF}')
          docker tag $IMAGE_ID payment-api:latest

      - name: Install Trivy v0.70.0 (pinned / SP 800-204D §5.1.2)
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.70.0

      - name: Trivy CIS Docker Benchmark (CM-2, SI-3 / CIS Docker §4, §5)
        run: |
          mkdir -p target
          trivy image \
            --compliance docker-cis-1.6 \
            --format json \
            --output target/trivy-cis-results.json \
            payment-api:latest
        continue-on-error: true

      - name: Upload Trivy CIS results
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: trivy-cis-results
          path: target/trivy-cis-results.json
          retention-days: 90

  # ══════════════════════════════════════════════════════════════
  # TEST Phase - Job 3: Integration Test + ZAP DAST
  # ══════════════════════════════════════════════════════════════

  integration-dast:
    name: "[TEST] Integration Test + ZAP DAST"
    runs-on: ubuntu-latest
    needs: [unit-test, sast-spotbugs, sca-grype, hadolint, trivy-cis, cis-java]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download Docker image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: docker-image-*
          merge-multiple: true

      - name: Load Docker image
        run: |
          IMAGE_ID=$(docker load < payment-api-image.tar.gz | grep "Loaded image" | awk '{print $NF}')
          docker tag $IMAGE_ID payment-api:latest

      - name: Start payment-api container
        run: |
          docker run -d \
            -p 8080:8080 \
            --name payment-api \
            --health-cmd="curl -f http://localhost:8080/actuator/health || exit 1" \
            --health-interval=10s \
            --health-timeout=3s \
            --health-retries=5 \
            payment-api:latest

      - name: Wait for container health
        run: |
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' payment-api 2>/dev/null)
            if [ "$STATUS" = "healthy" ]; then echo "Container is healthy"; break; fi
            echo "Attempt $i: status=$STATUS"
            sleep 5
          done
          if [ "$STATUS" != "healthy" ]; then
            echo "Container failed to become healthy"
            docker logs payment-api
            exit 1
          fi

      - name: Integration Tests (SA-11, AC-3, SI-10 / SSDF PW.8.1)
        run: |
          chmod +x test_payment_api.sh
          ./test_payment_api.sh

      - name: ZAP DAST Scan (SA-11, AC-3, SI-10 / SSDF PW.8.2)
        uses: zaproxy/action-full-scan@d2a07475d467566c9a3e3c700f31f47724aa1060  # v0.10.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
        continue-on-error: true

      - name: Upload ZAP report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: zap-report
          path: report_html.html
          retention-days: 90

      - name: Stop container
        if: always()
        run: docker stop payment-api && docker rm payment-api

  # ══════════════════════════════════════════════════════════════
  # TEST Phase - Job 4: Grype CVE Scan (Container Image)
  # ══════════════════════════════════════════════════════════════

  sca-grype-image:
    name: "[TEST] Grype - CVE Scan (Container Image)"
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download Docker image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: docker-image-*
          merge-multiple: true

      - name: Load Docker image
        run: |
          IMAGE_ID=$(docker load < payment-api-image.tar.gz | grep "Loaded image" | awk '{print $NF}')
          docker tag $IMAGE_ID payment-api:latest

      - name: Scan container image for CVEs (RA-5, SR-3 / SSDF PS.3.2)
        uses: anchore/scan-action@64a33b277ea7a1215a3c142735a1091341939ff5  # v4.1.2
        with:
          image: payment-api:latest
          fail-build: false
          severity-cutoff: critical
          output-format: json
        continue-on-error: true

  # ══════════════════════════════════════════════════════════════
  # RELEASE Phase
  # ══════════════════════════════════════════════════════════════

  release-gate:
    name: "[RELEASE] Go/No-Go + SLSA + SBOM SCA"
    runs-on: ubuntu-latest
    needs: [integration-dast, sca-grype-image, trivy-cis, sast-spotbugs]
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.integration-dast.result == 'success' &&
      (needs.sca-grype-image.result == 'success' || needs.sca-grype-image.result == 'skipped') &&
      needs.trivy-cis.result != 'failure' &&
      needs.sast-spotbugs.result != 'failure'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Rebuild for SLSA provenance
        run: mvn package -DskipTests

      - name: Generate checksums (SSDF PS.3.2 / DoD Guidebook Table 8)
        run: |
          sha256sum target/*.jar > target/checksums.sha256
          cat target/checksums.sha256

      - name: Download SBOM for release SCA
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: sbom-*
          merge-multiple: true
          path: target/

      - name: SBOM SCA at Release (DoD Guidebook Table 8 REQUIRED / RA-5, SR-3)
        uses: anchore/scan-action@64a33b277ea7a1215a3c142735a1091341939ff5  # v4.1.2
        with:
          sbom: target/payment-api-sbom.json
          fail-build: false
          severity-cutoff: critical
          output-format: json
        continue-on-error: true

      - name: SLSA Provenance Attestation (SSDF PS.2.1 / SP 800-204D §5.1.3)
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd  # v2.3.0
        with:
          subject-path: target/*.jar

      - name: Upload release artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: release-artifacts-${{ github.sha }}
          path: |
            target/*.jar
            target/checksums.sha256
            target/payment-api-sbom.json
          retention-days: 90

      - name: Go/No-Go Decision Record (DoD Guidebook Table 8 REQUIRED / CM-3)
        run: |
          echo "## Release Gate - Go/No-Go Decision" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "**Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | NIST Control | SSDF | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks | IA-5, SI-3 | PS.1 | ${{ needs.integration-dast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep SAST | SA-11, SI-10 | PW.7 | ${{ needs.integration-dast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SpotBugs SAST | SA-11, SC-13 | PW.7 | ${{ needs.sast-spotbugs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Grype CVE | RA-5, SI-2, SR-3 | RV.1 | ${{ needs.sca-grype-image.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy CIS Docker | CM-2, SI-3 | PW.4 | ${{ needs.trivy-cis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Test | SA-11, AC-3 | PW.8 | ${{ needs.integration-dast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ZAP DAST | SA-11, SI-10 | PW.8 | ${{ needs.integration-dast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SLSA Provenance | SR-3, CM-2 | PS.2 | generated |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM SCA @ Release | SR-3, RA-5 | PS.3 | completed |" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════
  # COMPLIANCE Phase
  # ══════════════════════════════════════════════════════════════

  compliance:
    name: "[COMPLIANCE] C2P - OSCAL Assessment Results"
    runs-on: ubuntu-latest
    needs: [release-gate]
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.release-gate.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'

      - name: Install C2P
        run: pip install compliance-to-policy

      - name: Download Trivy results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: trivy-cis-results
          path: evidence/trivy/
        continue-on-error: true

      - name: Download SpotBugs results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: spotbugs-report
          path: evidence/spotbugs/
        continue-on-error: true

      - name: Download CIS Java results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: cis-java-results
          path: evidence/cis-java/
        continue-on-error: true

      - name: C2P - Generate OSCAL Assessment Results (CA-7)
        run: |
          python3 << 'PYEOF'
          import json, uuid, datetime, os

          timestamp = datetime.datetime.utcnow().isoformat() + 'Z'
          run_id = '${{ github.run_id }}'
          commit = '${{ github.sha }}'
          actor = '${{ github.actor }}'

          job_results = {
              'secret-scan':      '${{ needs.release-gate.result }}',
              'sast-semgrep':     '${{ needs.release-gate.result }}',
              'sast-spotbugs':    '${{ needs.release-gate.result }}',
              'build':            '${{ needs.release-gate.result }}',
              'sca-grype':        '${{ needs.release-gate.result }}',
              'trivy-cis':        '${{ needs.release-gate.result }}',
              'unit-test':        '${{ needs.release-gate.result }}',
              'integration-dast': '${{ needs.release-gate.result }}',
              'sca-grype-image':  '${{ needs.release-gate.result }}',
              'cis-java':         '${{ needs.release-gate.result }}',
              'hadolint':         '${{ needs.release-gate.result }}',
              'checkov':          '${{ needs.release-gate.result }}',
              'release-gate':     '${{ needs.release-gate.result }}',
          }

          control_results = {
              'ia-5':  {'tools': ['gitleaks'], 'status': job_results['secret-scan']},
              'si-3':  {'tools': ['gitleaks', 'semgrep'], 'status': job_results['secret-scan']},
              'sa-11': {'tools': ['semgrep', 'spotbugs', 'junit'], 'status': job_results['sast-semgrep']},
              'si-10': {'tools': ['semgrep', 'spotbugs', 'zap'], 'status': job_results['sast-semgrep']},
              'sc-13': {'tools': ['semgrep', 'spotbugs'], 'status': job_results['sast-semgrep']},
              'ra-5':  {'tools': ['grype', 'trivy'], 'status': job_results['sca-grype']},
              'si-2':  {'tools': ['grype', 'trivy'], 'status': job_results['sca-grype']},
              'sr-3':  {'tools': ['grype', 'cyclonedx'], 'status': job_results['build']},
              'cm-2':  {'tools': ['trivy', 'hadolint'], 'status': job_results['trivy-cis']},
              'cm-7':  {'tools': ['hadolint', 'cis-java'], 'status': job_results['hadolint']},
              'sc-8':  {'tools': ['cis-java'], 'status': job_results['cis-java']},
              'ac-3':  {'tools': ['zap', 'integration-test'], 'status': job_results['integration-dast']},
              'cm-8':  {'tools': ['cyclonedx'], 'status': job_results['build']},
              'cm-6':  {'tools': ['checkov', 'opa-gatekeeper'], 'status': job_results['checkov']},
              'ac-4':  {'tools': ['checkov', 'opa-gatekeeper'], 'status': job_results['checkov']},
              'ac-6':  {'tools': ['checkov', 'opa-gatekeeper'], 'status': job_results['checkov']},
              'sc-5':  {'tools': ['checkov', 'opa-gatekeeper'], 'status': job_results['checkov']},
              'sc-28': {'tools': ['checkov', 'ecr-aes256'], 'status': job_results['checkov']},
              'au-2':  {'tools': ['falco', 'loki'], 'status': job_results['build']},
              'au-3':  {'tools': ['loki', 'otel'], 'status': job_results['build']},
              'au-6':  {'tools': ['loki', 'grafana'], 'status': job_results['build']},
              'au-9':  {'tools': ['s3', 'ecr'], 'status': job_results['build']},
              'au-12': {'tools': ['loki', 'promtail', 'otel'], 'status': job_results['build']},
              'ir-5':  {'tools': ['falco', 'loki'], 'status': job_results['build']},
              'ir-6':  {'tools': ['falco', 'loki'], 'status': job_results['build']},
              'ra-3':  {'tools': ['grype', 'trivy', 'semgrep'], 'status': job_results['sca-grype']},
              'sa-8':  {'tools': ['semgrep', 'hadolint'], 'status': job_results['sast-semgrep']},
              'sa-10': {'tools': ['github-actions', 'slsa'], 'status': job_results['build']},
              'sa-15': {'tools': ['slsa', 'cosign'], 'status': job_results['release-gate']},
              'sa-17': {'tools': ['zap', 'spotbugs', 'jacoco'], 'status': job_results['integration-dast']},
              'si-4':  {'tools': ['falco', 'otel'], 'status': job_results['build']},
              'si-7':  {'tools': ['cosign', 'slsa'], 'status': job_results['release-gate']},
              'sr-4':  {'tools': ['cyclonedx', 'sbom'], 'status': job_results['build']},
              'sr-11': {'tools': ['cosign', 'slsa'], 'status': job_results['release-gate']},
              'ia-2':  {'tools': ['github-oidc'], 'status': job_results['build']},
              'ia-3':  {'tools': ['cosign'], 'status': job_results['release-gate']},
              'ac-2':  {'tools': ['opa-gatekeeper', 'k8s-rbac'], 'status': job_results['checkov']},
              'ac-17': {'tools': ['github-oidc', 'aws-oidc'], 'status': job_results['build']},
              'ca-2':  {'tools': ['github-actions', 'oscal'], 'status': job_results['release-gate']},
              'ca-7':  {'tools': ['falco', 'kube-bench', 'grafana'], 'status': job_results['build']},
              'ca-9':  {'tools': ['otel', 'loki'], 'status': job_results['build']},
          }

          assessment = {
              'assessment-results': {
                  'uuid': str(uuid.uuid4()),
                  'metadata': {
                      'title': 'JC Company payment-api DevSecOps Pipeline Assessment',
                      'last-modified': timestamp,
                      'version': commit[:8],
                      'oscal-version': '1.1.2',
                      'props': [
                          {'name': 'github-run-id', 'value': run_id},
                          {'name': 'commit-sha', 'value': commit},
                          {'name': 'actor', 'value': actor},
                      ]
                  },
                  'import-ap': {'href': '#'},
                  'results': [{
                      'uuid': str(uuid.uuid4()),
                      'title': f'Pipeline Run {run_id}',
                      'description': f'Automated assessment from GitHub Actions pipeline run {run_id}',
                      'start': timestamp,
                      'end': timestamp,
                      'findings': [
                          {
                              'uuid': str(uuid.uuid4()),
                              'title': f'{ctrl.upper()} - {data["tools"]}',
                              'description': f'Control {ctrl} assessed via {", ".join(data["tools"])}',
                              'target': {
                                  'type': 'objective-id',
                                  'target-id': ctrl,
                                  'status': {
                                      'state': 'satisfied' if data['status'] == 'success' else 'not-satisfied'
                                  }
                              }
                          }
                          for ctrl, data in control_results.items()
                      ]
                  }]
              }
          }

          os.makedirs('oscal-results', exist_ok=True)
          with open('oscal-results/assessment-results.json', 'w') as f:
              json.dump(assessment, f, indent=2)

          satisfied = sum(1 for d in control_results.values() if d['status'] == 'success')
          total = len(control_results)
          print(f'OSCAL Assessment Results generated: {satisfied}/{total} satisfied')
          PYEOF

      - name: Push OSCAL Assessment Results to Loki (CA-7 / AU-2)
        run: |
          python3 << 'PYEOF'
          import json, time, urllib.request
          from collections import defaultdict

          with open('oscal-results/assessment-results.json') as f:
              ar = json.load(f)

          findings = ar['assessment-results']['results'][0]['findings']
          run_id = '${{ github.run_id }}'
          commit = '${{ github.sha }}'[:8]
          actor = '${{ github.actor }}'
          repo = '${{ github.repository }}'
          actions_url = f'https://github.com/{repo}/actions/runs/{run_id}'

          # 통제 → 파이프라인 단계 매핑
          control_phases = {
              'ia-5': 'DEVELOP', 'si-3': 'DEVELOP',
              'sa-11': 'BUILD', 'si-10': 'BUILD', 'sc-13': 'BUILD',
              'sr-3': 'BUILD', 'cm-7': 'BUILD', 'sc-8': 'BUILD',
              'cm-8': 'BUILD', 'cm-6': 'BUILD', 'ac-4': 'BUILD',
              'ac-6': 'BUILD', 'sc-5': 'BUILD', 'sc-28': 'BUILD',
              'sa-8': 'BUILD', 'sa-10': 'BUILD', 'sr-4': 'BUILD',
              'ac-2': 'BUILD',
              'ra-5': 'TEST', 'si-2': 'TEST', 'cm-2': 'TEST',
              'ac-3': 'TEST', 'ra-3': 'TEST', 'sa-17': 'TEST',
              'sa-15': 'RELEASE', 'si-7': 'RELEASE', 'sr-11': 'RELEASE',
              'ca-2': 'RELEASE',
              'ia-2': 'DELIVER', 'ia-3': 'DELIVER', 'ac-17': 'DELIVER',
              'ca-7': 'DEPLOY',
              'au-2': 'RUNTIME', 'au-3': 'RUNTIME', 'au-6': 'RUNTIME',
              'au-9': 'RUNTIME', 'au-12': 'RUNTIME',
              'ir-5': 'RUNTIME', 'ir-6': 'RUNTIME',
              'si-4': 'RUNTIME', 'ca-9': 'RUNTIME',
          }

          streams = []
          tool_counts = defaultdict(int)
          phase_counts = defaultdict(lambda: {'satisfied': 0, 'total': 0})

          for finding in findings:
              ctrl = finding['target']['target-id']
              state = finding['target']['status']['state']
              family = ctrl.split('-')[0].upper()
              phase = control_phases.get(ctrl, 'OTHER')
              tools_raw = finding['title'].split(' - ')[1] if ' - ' in finding['title'] else ''

              # 도구별 카운트 집계
              tools_list = eval(tools_raw) if tools_raw.startswith('[') else [tools_raw]
              for tool in tools_list:
                  if tool.strip():
                      tool_counts[tool.strip()] += 1

              # 깔끔한 포맷: "cyclonedx, sbom" (대시보드 표시용)
              tools = ', '.join(t.strip() for t in tools_list if t.strip())

              # 단계별 카운트 집계
              phase_counts[phase]['total'] += 1
              if state == 'satisfied':
                  phase_counts[phase]['satisfied'] += 1

              log_line = json.dumps({
                  'control_id': ctrl,
                  'family': family,
                  'phase': phase,
                  'state': state,
                  'tools': tools,
                  'run_id': run_id,
                  'commit': commit,
                  'actor': actor,
                  'actions_url': actions_url,
              })

              streams.append({
                  'stream': {
                      'job': 'oscal-assessment',
                      'control_id': ctrl,
                      'family': family,
                      'phase': phase,
                      'state': state,
                      'pipeline_run': run_id,
                      'commit': commit,
                  },
                  'values': [[str(time.time_ns()), log_line]]
              })

          satisfied = sum(1 for f in findings if f['target']['status']['state'] == 'satisfied')
          total = len(findings)

          # 전체 summary
          summary_line = json.dumps({
              'type': 'summary',
              'total_controls': total,
              'satisfied': satisfied,
              'not_satisfied': total - satisfied,
              'coverage_pct': round(satisfied / total * 100, 1),
              'run_id': run_id,
              'commit': commit,
              'actions_url': actions_url,
          })
          streams.append({
              'stream': {
                  'job': 'oscal-assessment',
                  'type': 'summary',
                  'pipeline_run': run_id,
              },
              'values': [[str(time.time_ns()), summary_line]]
          })

          # 도구별 summary
          for tool, count in sorted(tool_counts.items()):
              tool_line = json.dumps({
                  'type': 'tool-summary',
                  'tool': tool,
                  'controls_covered': count,
                  'run_id': run_id,
                  'commit': commit,
              })
              streams.append({
                  'stream': {
                      'job': 'oscal-assessment',
                      'type': 'tool-summary',
                      'tool': tool,
                      'pipeline_run': run_id,
                  },
                  'values': [[str(time.time_ns()), tool_line]]
              })

          # 단계별 summary
          for phase, counts in sorted(phase_counts.items()):
              phase_line = json.dumps({
                  'type': 'phase-summary',
                  'phase': phase,
                  'total': counts['total'],
                  'satisfied': counts['satisfied'],
                  'run_id': run_id,
                  'commit': commit,
              })
              streams.append({
                  'stream': {
                      'job': 'oscal-assessment',
                      'type': 'phase-summary',
                      'phase': phase,
                      'pipeline_run': run_id,
                  },
                  'values': [[str(time.time_ns()), phase_line]]
              })

          payload = json.dumps({'streams': streams}).encode()
          req = urllib.request.Request(
              'https://loki.miata.cloud/loki/api/v1/push',
              data=payload,
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          try:
              with urllib.request.urlopen(req, timeout=10) as resp:
                  print(f'Loki push: {resp.status} - {satisfied}/{total} controls')
                  print(f'  Tools: {len(tool_counts)} | Phases: {len(phase_counts)}')
          except Exception as e:
              print(f'Loki push warning: {e}')
          PYEOF

      - name: Upload OSCAL Assessment Results (CA-7 / AU-9)
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: oscal-assessment-results-${{ github.sha }}
          path: oscal-results/assessment-results.json
          retention-days: 90

      - name: Summary
        run: |
          echo "## COMPLIANCE - OSCAL Assessment Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat oscal-results/assessment-results.json | python3 -c "
          import json, sys
          ar = json.load(sys.stdin)
          findings = ar['assessment-results']['results'][0]['findings']
          satisfied = sum(1 for f in findings if f['target']['status']['state'] == 'satisfied')
          print(f'| Controls Assessed | {len(findings)} |')
          print(f'| Controls Satisfied | {satisfied} |')
          print(f'| Controls Not Satisfied | {len(findings) - satisfied} |')
          " >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════
  # DELIVER Phase - ECR Push + Cosign
  # Phase 3 변경사항:
  #   H4: SBOM SCA를 ECR push 이후로 이동 (기존: push 전 실행 → 이미지 미존재 버그)
  #   M1: SBOM SCA 결과 S3 업로드 추가
  #   outputs: image-digest 추가 (DEPLOY 잡에서 GitOps digest pinning에 사용)
  # ══════════════════════════════════════════════════════════════

  deliver:
    name: "[DELIVER] ECR Push + Config Integration Test"
    runs-on: ubuntu-latest
    needs: [release-gate]
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.release-gate.result == 'success'
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
      image-digest: ${{ steps.push.outputs.image-digest }}  # H3: digest pinning용
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests

      - name: Set image metadata (SP 800-204D §5.1.3)
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE_TAG="v$(date +%Y%m%d)-${SHORT_SHA}"
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${IMAGE_TAG}"

      - name: Configure AWS credentials (OIDC / SP 800-204D §5.1.2)
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722  # v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-deliver-${{ github.run_id }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076  # v2.0.1

      - name: Download Docker image from BUILD
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: docker-image-*
          merge-multiple: true

      - name: Load and retag Docker image
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.image-tag }}"
          IMAGE_URI="${{ secrets.ECR_REGISTRY }}/jccompany/payment-api:${IMAGE_TAG}"
          IMAGE_ID=$(docker load < payment-api-image.tar.gz | grep "Loaded image" | awk '{print $NF}')
          docker tag $IMAGE_ID $IMAGE_URI
          echo "Tagged: $IMAGE_URI"

      - name: Config Integration Test (DoD Table 9 REQUIRED / CM-3)
        run: |
          IMAGE_URI="${{ secrets.ECR_REGISTRY }}/jccompany/payment-api:${{ steps.meta.outputs.image-tag }}"
          docker run --rm \
            -e SPRING_PROFILES_ACTIVE=test \
            $IMAGE_URI \
            java -jar /app/app.jar \
            --spring.main.web-application-type=none 2>/dev/null || true
          echo "Config validation completed"

      # ── Phase 3 H4 fix: ECR Push를 SBOM SCA 앞으로 이동 ──────────────────
      - name: ECR Push (SP 800-204D §5.1.2 / SR-3)
        id: push
        run: |
          IMAGE_URI="${{ secrets.ECR_REGISTRY }}/jccompany/payment-api:${{ steps.meta.outputs.image-tag }}"
          PUSH_OUTPUT=$(docker push $IMAGE_URI)
          echo "$PUSH_OUTPUT"
          # docker push 출력에서 digest 파싱 (ecr:DescribeImages 권한 불필요)
          DIGEST=$(echo "$PUSH_OUTPUT" | grep "digest:" | awk '{print $3}')
          echo "image-digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "Pushed: ${IMAGE_URI}@${DIGEST}"

      - name: Install Cosign (SSDF PS.2.1 / SR-3)
        uses: sigstore/cosign-installer@c56c2d3e59e4281cc41dea2217323ba5694b171e  # v3.8.0

      - name: Sign image with OIDC (SP 800-204D §5.1.3)
        run: |
          IMAGE_URI="${{ secrets.ECR_REGISTRY }}/jccompany/payment-api:${{ steps.meta.outputs.image-tag }}"
          cosign sign --yes $IMAGE_URI
          echo "Image signed: $IMAGE_URI"

      # ── Phase 3 H4 fix: push 후 ECR 이미지 스캔 (기존: push 전 → 미존재 버그) ─
      - name: SBOM SCA at DELIVER (DoD Table 9 REQUIRED / RA-5, SR-3)
        uses: anchore/scan-action@64a33b277ea7a1215a3c142735a1091341939ff5  # v4.1.2
        id: deliver-sca
        with:
          image: ${{ secrets.ECR_REGISTRY }}/jccompany/payment-api:${{ steps.meta.outputs.image-tag }}
          fail-build: false
          severity-cutoff: critical
          output-format: json
          output-file: deliver-sca-results.json
        continue-on-error: true

      # ── Phase 3 M1 fix: SBOM SCA 결과 S3 업로드 ─────────────────────────
      - name: Upload SBOM SCA results to GitHub Artifact (SSDF RV.1.3)
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: deliver-sbom-sca-${{ github.sha }}
          path: deliver-sca-results.json
          retention-days: 90

      - name: Upload SBOM SCA to S3 (AU-9 / SP 800-204D §5.1.3)
        if: always()
        run: |
          if [ -f deliver-sca-results.json ]; then
            aws s3 cp deliver-sca-results.json \
              s3://${{ secrets.S3_EVIDENCE_BUCKET }}/deliver/${{ github.sha }}/sbom-sca.json
            echo "SBOM SCA results uploaded to S3"
          fi

      - name: Upload SBOM to S3 (SSDF PS.3.2 / AU-9)
        run: |
          aws s3 cp target/payment-api-sbom.json \
            s3://${{ secrets.S3_EVIDENCE_BUCKET }}/sbom/${{ github.sha }}/payment-api-sbom.json
          echo "SBOM uploaded to S3"

      - name: Deliver Summary
        run: |
          echo "## DELIVER Phase Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ steps.meta.outputs.image-tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Digest | ${{ steps.push.outputs.image-digest }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ECR Push | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Cosign Signed | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM SCA (post-push) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM to S3 | ✅ |" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════
  # DEPLOY Phase - GitOps Push + ArgoCD Sync + Post-deploy Scan
  # Phase 3 변경사항 (전체 재작성):
  #   H3: kubectl 직접 배포 제거 → GitHub App으로 GitOps push
  #       argocd app wait으로 sync 확인 (M5 fix 포함)
  #   H5: post-deploy Grype 버전 고정 v0.112.0
  #   H6: kube-bench SHA 고정 + kubectl wait으로 교체 (sleep 60s 제거)
  #   H8: SBOM SCA at DEPLOY 추가 (DoD Table 10 REQUIRED)
  #   M1: post-deploy Grype 결과 S3 업로드
  #   M6: kube-bench 결과 S3 업로드
  # ══════════════════════════════════════════════════════════════

  deploy:
    name: "[DEPLOY] GitOps Push + ArgoCD Sync + Post-deploy Scan"
    runs-on: ubuntu-latest
    needs: [deliver, compliance]
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.deliver.result == 'success' &&
      needs.compliance.result == 'success'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722  # v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-deploy-${{ github.run_id }}

      - name: Update kubeconfig (ArgoCD login + post-deploy 스캔용)
        run: |
          aws eks update-kubeconfig \
            --name jccompany-eks \
            --region ${{ secrets.AWS_REGION }}

      # ── H3: GitOps push (kubectl 직접 배포 완전 제거) ────────────────────
      - name: Generate GitHub App token (SP 800-204D §5.1.2 / SSDF PS.3.1)
        uses: actions/create-github-app-token@c1a285145b9d317df6ced56c09f525b5c2b6f755  # v1.11.1
        id: app-token
        with:
          app-id: ${{ secrets.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          repositories: jccompany-gitops

      - name: Push image digest to GitOps repo (DoD Table 10 / CM-2, CM-3)
        env:
          IMAGE_TAG: ${{ needs.deliver.outputs.image-tag }}
          IMAGE_DIGEST: ${{ needs.deliver.outputs.image-digest }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          IMAGE_REF="${{ secrets.ECR_REGISTRY }}/jccompany/payment-api@${IMAGE_DIGEST}"
          echo "Deploying: ${IMAGE_REF}"

          git clone \
            https://x-access-token:${GH_TOKEN}@github.com/s1ns3nz0/jccompany-gitops.git \
            /tmp/gitops

          cd /tmp/gitops

          # deployment.yaml의 image 필드를 digest 방식으로 교체
          sed -i "s|image:.*jccompany/payment-api.*|image: ${IMAGE_REF}|" \
            apps/payment-api/deployment.yaml

          git config user.email "gitops-bot@jccompany"
          git config user.name "jccompany-gitops-bot"
          git add apps/payment-api/deployment.yaml

          # 변경사항 없으면 (동일 digest 재배포) 스킵
          if git diff --cached --quiet; then
            echo "No changes detected (same digest), skipping push"
            exit 0
          fi

          git commit -m "$(printf 'deploy: payment-api %s (%s)\n\nimage: %s\ntriggered-by: github-actions/%s\nactor: %s' \
            "${IMAGE_TAG}" "${GITHUB_SHA::8}" "${IMAGE_REF}" "${GITHUB_RUN_ID}" "${{ github.actor }}")"

          git push
          echo "GitOps push complete: ${IMAGE_REF}"

      # ── ArgoCD CLI 설치 + sync wait (M5 fix) ──────────────────────────
      - name: Install ArgoCD CLI v2.14.3 (pinned / SP 800-204D §5.1.2)
        run: |
          curl -sSL -o /tmp/argocd \
            https://github.com/argoproj/argo-cd/releases/download/v2.14.3/argocd-linux-amd64
          echo "24a8a197f7c1bcf1caa537ca9b299e7cec4dfe4214be4ac7f9dc70824030220a  /tmp/argocd" \
            | sha256sum -c
          chmod +x /tmp/argocd
          mv /tmp/argocd /usr/local/bin/argocd
          argocd version --client

      - name: ArgoCD login + wait for sync (DoD Table 10 / CM-3)
        run: |
          ARGOCD_PASSWORD=$(kubectl get secret argocd-admin-password \
            -n argocd \
            -o jsonpath='{.data.password}' | base64 -d)

          argocd login argocd.miata.cloud \
            --insecure \
            --grpc-web \
            --username admin \
            --password "${ARGOCD_PASSWORD}"

          echo "Waiting for ArgoCD sync + health..."
          argocd app wait payment-api \
            --sync \
            --health \
            --timeout 300 \
            --grpc-web

          echo "ArgoCD sync completed"
          argocd app get payment-api --grpc-web

      # ── Smoke Test ────────────────────────────────────────────────────
      - name: Smoke Test (DoD Table 10 REQUIRED)
        run: |
          ALB_URL=$(kubectl get ingress payment-api-ingress \
            -n payment-api \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")

          if [ "${ALB_URL}" != "pending" ]; then
            sleep 30
            if curl -sf "http://${ALB_URL}/actuator/health"; then
              echo "Smoke test passed"
            else
              echo "::warning::Smoke test health check failed (non-blocking)"
            fi
          else
            echo "::warning::ALB not ready, smoke test skipped"
          fi

      # ── H8: SBOM SCA at DEPLOY (DoD Table 10 REQUIRED 신규 추가) ─────
      - name: Download SBOM for deploy SCA
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: sbom-*
          merge-multiple: true
          path: target/

      - name: SBOM SCA at DEPLOY (DoD Table 10 REQUIRED / RA-5, SR-3)
        uses: anchore/scan-action@64a33b277ea7a1215a3c142735a1091341939ff5  # v4.1.2
        with:
          sbom: target/payment-api-sbom.json
          fail-build: false
          severity-cutoff: critical
          output-format: json
          output-file: deploy-sca-results.json
        continue-on-error: true

      - name: Upload SBOM SCA results (SSDF RV.1.3 / SP 800-204D §5.1.3)
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: deploy-sbom-sca-${{ github.sha }}
          path: deploy-sca-results.json
          retention-days: 90

      - name: Upload SBOM SCA to S3 (AU-9)
        if: always()
        run: |
          if [ -f deploy-sca-results.json ]; then
            aws s3 cp deploy-sca-results.json \
              s3://${{ secrets.S3_EVIDENCE_BUCKET }}/deploy/${{ github.sha }}/sbom-sca.json
          fi

      # ── H5: Post-deploy Grype (v0.112.0 버전 고정) ───────────────────────
      - name: Login to ECR (Grype image pull 인증 / SP 800-204D §5.1.2)
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076  # v2.0.1

      - name: Install Grype v0.112.0 (pinned / SP 800-204D §5.1.2)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin v0.112.0
          grype version

      - name: Post-deploy Security Scan (DoD Table 10 REQUIRED / RA-5)
        env:
          IMAGE_TAG: ${{ needs.deliver.outputs.image-tag }}
        run: |
          IMAGE_URI="${{ secrets.ECR_REGISTRY }}/jccompany/payment-api:${IMAGE_TAG}"
          grype "${IMAGE_URI}" --output json > /tmp/post-deploy-grype.json || true
          grype "${IMAGE_URI}" --output table --fail-on critical || true
          echo "Post-deploy scan completed"

      # ── M1: post-deploy Grype 결과 S3 업로드 (신규) ───────────────────
      - name: Upload post-deploy Grype results (SSDF RV.1.3)
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: post-deploy-grype-${{ github.sha }}
          path: /tmp/post-deploy-grype.json
          retention-days: 90

      - name: Upload post-deploy Grype to S3 (AU-9)
        if: always()
        run: |
          if [ -f /tmp/post-deploy-grype.json ]; then
            aws s3 cp /tmp/post-deploy-grype.json \
              s3://${{ secrets.S3_EVIDENCE_BUCKET }}/deploy/${{ github.sha }}/grype-post-deploy.json
          fi

      # ── H6: kube-bench SHA 고정 + kubectl wait (sleep 60s 제거) ──────
      - name: kube-bench CIS Kubernetes (pinned SHA / DoD Table 10 / CM-2, CA-7)
        run: |
          # SHA: aquasecurity/kube-bench job.yaml @2026-05
          # 재확인: https://github.com/aquasecurity/kube-bench/commits/main/job.yaml
          KUBE_BENCH_SHA="ccb3d707293dac66338f0381e2d62fe5e8740953"
          kubectl apply -f \
            "https://raw.githubusercontent.com/aquasecurity/kube-bench/${KUBE_BENCH_SHA}/job.yaml"

          kubectl wait --for=condition=complete job/kube-bench \
            --timeout=120s \
            -n default

          kubectl logs job/kube-bench > /tmp/kube-bench.txt
          echo "=== kube-bench summary ===" && tail -30 /tmp/kube-bench.txt
          kubectl delete job kube-bench --ignore-not-found

      # ── M6: kube-bench 결과 S3 업로드 (신규) ─────────────────────────
      - name: Upload kube-bench results (SSDF RV.1.3 / DoD Table 10)
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        if: always()
        with:
          name: kube-bench-${{ github.sha }}
          path: /tmp/kube-bench.txt
          retention-days: 90

      - name: Upload kube-bench to S3 (AU-9)
        if: always()
        run: |
          if [ -f /tmp/kube-bench.txt ]; then
            aws s3 cp /tmp/kube-bench.txt \
              s3://${{ secrets.S3_EVIDENCE_BUCKET }}/deploy/${{ github.sha }}/kube-bench.txt
          fi

      - name: Upload deploy evidence to S3 (AU-9 / SSDF PS.3.2)
        run: |
          kubectl get all -n payment-api -o json > /tmp/deploy-manifest.json
          aws s3 cp /tmp/deploy-manifest.json \
            s3://${{ secrets.S3_EVIDENCE_BUCKET }}/deploy/${{ github.sha }}/manifest.json
          echo "Deploy evidence uploaded to S3"

      - name: Deploy Summary
        run: |
          echo "## DEPLOY Phase Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ needs.deliver.outputs.image-tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Digest | ${{ needs.deliver.outputs.image-digest }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy method | GitOps → jccompany-gitops ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| ArgoCD sync | waited (timeout 300s) ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM SCA at DEPLOY | ✅ (DoD Table 10) |" >> $GITHUB_STEP_SUMMARY
          echo "| Post-deploy Grype | ✅ (v0.112.0 pinned) |" >> $GITHUB_STEP_SUMMARY
          echo "| kube-bench | ✅ (SHA pinned, kubectl wait) |" >> $GITHUB_STEP_SUMMARY
          echo "| Evidence to S3 | manifest + grype + kube-bench + sbom-sca ✅ |" >> $GITHUB_STEP_SUMMARY
